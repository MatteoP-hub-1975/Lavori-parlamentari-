name: Monitor Gazzetta Ufficiale

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  monitor-gazzetta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      - name: Run Gazzetta monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p output
          python scripts/gazzetta_monitor.py > output/gazzetta_output.json

      - name: Generate Gazzetta email text
        run: |
          python scripts/generate_gazzetta_email.py > output/gazzetta_email.txt

      - name: Send Gazzetta email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python scripts/send_gazzetta_email.py

      - name: Test AI analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/analyze_gazzetta_ai.py 2>&1 | tee output/gazzetta_ai_test.txt

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: gazzetta-output
          path: output/