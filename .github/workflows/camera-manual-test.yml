name: Camera manual test

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Data da analizzare (YYYY-MM-DD)"
        required: true
        default: "2026-03-16"

jobs:
  camera-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai pymupdf

      - name: Run Camera fetch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/fetch_camera_atti.py "${{ github.event.inputs.target_date }}"

      - name: Run Camera agenda fetch
        run: |
          python scripts/fetch_camera_agenda.py "${{ github.event.inputs.target_date }}"

      - name: Run Camera parse
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ai_parse_camera_page.py "${{ github.event.inputs.target_date }}"

      - name: Run Camera PDF analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/analyze_camera_pdfs.py "${{ github.event.inputs.target_date }}"

      - name: Upload Camera output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camera-output-${{ github.event.inputs.target_date }}
          path: data/camera/*.json
          if-no-files-found: warn