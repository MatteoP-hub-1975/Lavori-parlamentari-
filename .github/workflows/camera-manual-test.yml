name: Camera manual test

on:
  workflow_dispatch:

jobs:
  camera-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set target date
        id: set_target_date
        run: echo "target_date=2026-03-25" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai pymupdf

      - name: Run Camera fetch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/fetch_camera_atti.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Fetch agenda Camera operativa
        run: |
          python scripts/fetch_camera_agenda_operativa.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Scan Camera ODG alerts
        run: |
          python scripts/scan_camera_odg_alerts.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera resoconti fetch
        run: |
          python scripts/fetch_camera_resoconti.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera audizioni fetch
        run: |
          python scripts/fetch_camera_audizioni.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Scan Camera resoconti for emendamenti
        run: |
          python scripts/scan_camera_resoconti_for_emendamenti.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera commissioni SPARQL
        run: |
          python scripts/fetch_camera_commissioni_sparql.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Test Camera future monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python scripts/test_camera_future_monitor.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera agenda fetch
        run: |
          python scripts/fetch_camera_agenda.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera SPARQL probe
        run: |
          python scripts/fetch_camera_sparql_probe.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera parse
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ai_parse_camera_page.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Run Camera PDF analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/analyze_camera_pdfs.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Send Camera email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          python scripts/send_camera_report_email.py "${{ steps.set_target_date.outputs.target_date }}"

      - name: Upload Camera output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camera-output-${{ steps.set_target_date.outputs.target_date }}
          path: data/camera/*.json
          if-no-files-found: warn