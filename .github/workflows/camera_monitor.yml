name: Camera monitor

on:
  schedule:
    - cron: "0 10 * * *"
      timezone: "Europe/Rome"
  workflow_dispatch:

jobs:
  camera-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfminer.six openai

      - name: Debug secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.SMTP_USER }}
          EMAIL_PASS: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.SMTP_TO }}
        run: |
          echo "OPENAI_API_KEY: $([[ -n "$OPENAI_API_KEY" ]] && echo OK || echo MISSING)"
          echo "EMAIL_USER: $([[ -n "$EMAIL_USER" ]] && echo OK || echo MISSING)"
          echo "EMAIL_PASS: $([[ -n "$EMAIL_PASS" ]] && echo OK || echo MISSING)"
          echo "EMAIL_TO: $([[ -n "$EMAIL_TO" ]] && echo OK || echo MISSING)"

      - name: Run Camera monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USER: ${{ secrets.SMTP_USER }}
          EMAIL_PASS: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.SMTP_TO }}
        run: |
          python scripts/camera_monitor.py

      - name: Commit state file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
          git add data/camera_ai/camera_ai_last.json || true
      
          git commit -m "Update camera AI state" || echo "No changes to commit"
      
          git push

      - name: Upload Camera output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camera-output
          path: |
            data/camera_ai/**
            camera.pdf
          if-no-files-found: warn